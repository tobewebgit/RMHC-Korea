    <link rel="stylesheet" href="/src/css/common.css" />

  <body>
    <!-- 웹 접근성 스킵 네비게이션 -->
    <a href="#main-content" class="skip-nav">본문 바로가기</a>

    <!-- 헤더 공통 영역 인클루드 -->
    <load ="/includes/header.html" />

    <div class="page-wrapper">
      <main id="main-content">
        <div class="campaign-container inner-layout">
          <div class="page-header-wrap">
            <h1 class="page-title">맥도날드 해피워크<br class="type-pc" /> 함께 걷는 걸음이 환아 가족의 희망이 됩니다.</h1>
            <p class="">맥도날드 해피워크는 가족이 함께 걸으며 환아 가족에게 따뜻한 응원을 전하는 참여형 캠페인입니다. 참여자 한 사람 한 사람의 걸음이 모여 치료 중인 아이와 가족이 함께 머물고 회복할 수 있는 공간을 만들어갑니다. 함께 걷는 모든 순간은 환아 가족의 일상을 지키는 든든한 힘이 됩니다.</p>
          </div>

          <div class="img-top-wrap">
            <div class="img-item"><img src="/src/images/campaign/img_top.png" alt=""></div>
            <button type="button" class="btn-play">
              <img src="/src/images/common/btn_play.png" alt="재생">
            </button>
            <!-- https://youtu.be/kmEtUuZkO6I?si=EewtugqcPxKj-mv6 -->
          </div>
        
          <div class="line-path-wrap">
            <h2 class="sub-title">함께 걷는 걸음마다<br class="type-pc">환아 가족을 향한 응원이 이어집니다.</h2>
            
            <!-- line path motion -->
          </div>
        </div>
    </div>
