  <body>
    <!-- 웹 접근성 스킵 네비게이션 -->

    <div class="page-wrapper">
      <main id="main-content">
        <div class="campaign-container inner-layout">
          <div class="page-header-wrap">
            <section>
              <h1 class="page-title">울림 백일장<br class="type-pc" />마음으로 전하는 이야기, 따뜻한 울림이 됩니다.</h1>
              <p class="">울림백일장은 만 18세 이하 전국의 중증 환아들이 참여하는 백일장입니다. <br class="type-pc">동시와 그림일기 부문을 통해 아이들의 마음속 이야기를 세상에 전하며, 작은 목소리가 큰 울림이 되어 희망을 나눕니다.</p>
            </div>
  
            <div class="img-top-wrap">
              <div class="img-item"><img src="/src/images/campaign/img_contest_top.png" alt=""></div>
            </div>
  
            <div class="button-wrap">
              <button type="button" class="btn btn-primary btn-down w-auto">신청서 양식 다운로드</button>
            </div>
          </section>

          <section class="">
            <h2 class="">작년 수상작 알아보기</h2>
            <p class="">함께 만드는 따뜻한 이야기를 만나보세요.</p>
            
            <!-- 슬라이드 -->
            <div class="award-slide-wrap">
              <div class="award-slide-item"></div>
            </div>
          </section>
        </div>
      </main>
