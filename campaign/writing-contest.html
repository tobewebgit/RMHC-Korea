    <!-- Swiper JS CDN -->
    <script type="module">
      import { createSwiper } from '/src/js/components/swiper-utils.js';

      document.addEventListener("DOMContentLoaded", () => {
        // Swiper 초기화
        const awardSwiper = createSwiper(".award-slide-container", {
          slidesPerView: 1,
          spaceBetween: 30,
          loop: false,
          pagination: {
            el: ".award-swiper-pagination",
            clickable: true,
          },
        });

        // 수상작 상세 이미지 동적 매핑 핸들러
        document.querySelectorAll('.award-item').forEach(item => {
          item.addEventListener('click', () => {
            const awardId = item.getAttribute('data-award-id');
            const detailImg = document.getElementById('award-detail-img');
            if (awardId && detailImg) {
              const detailSrc = `/src/images/campaign/img_contest_detail_${awardId}.png`;
              const fallbackSrc = `/src/images/campaign/img_contest_slide_${awardId}.png`;
              
              // 임시 이미지 객체를 생성해 존재 여부 검증 후 로드 (404 깨진 이미지 방지)
              const tempImg = new Image();
              tempImg.onload = () => {
                detailImg.src = detailSrc;
              };
              tempImg.onerror = () => {
                detailImg.src = fallbackSrc;
              };
              tempImg.src = detailSrc;
            }
          });
        });
      });
    </script>
