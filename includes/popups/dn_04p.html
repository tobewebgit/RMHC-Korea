<!-- DN_04P: 자원봉사신청 팝업 (개인 / 기업·단체 구분 폼 구조 및 VMS 고지 포함) -->
<div class="modal-overlay" id="modal-dn_04p">
  <div class="modal-container modal-container--lg">
    
    <!-- S: 팝업 헤더 -->
    <div class="modal-header">
      <h3 class="modal-title">자원봉사 신청</h3>
      <button type="button" class="modal-close-btn" aria-label="닫기">&times;</button>
    </div>
    <!-- E: 팝업 헤더 -->

    <!-- S: 팝업 본문 -->
    <div class="modal-body">
      
      <!-- 자원봉사 구분 선택 탭 -->
      <div class="modal-tabs">
        <button type="button" class="modal-tab-btn active" data-tab="volunteer-personal">개인 봉사 신청</button>
        <button type="button" class="modal-tab-btn" data-tab="volunteer-group">기업·단체 봉사 신청</button>
      </div>

      <!-- 폼 세션 시작 -->
      <form id="volunteerForm" class="volunteer-form">
        
        <!-- ================= S: 개인 봉사 신청 폼 ================= -->
        <div class="tab-content active" id="volunteer-personal">
          <div class="form-grid">
            <div class="form-group">
              <label for="vp_name" class="form-label">성명 <span class="required">*</span></label>
              <input type="text" id="vp_name" class="form-control" placeholder="성명을 입력해 주세요" required>
            </div>
            <div class="form-group">
              <label for="vp_birth" class="form-label">생년월일 <span class="required">*</span></label>
              <input type="text" id="vp_birth" class="form-control" placeholder="YYYY-MM-DD" required>
            </div>
            <div class="form-group">
              <label for="vp_phone" class="form-label">연락처 <span class="required">*</span></label>
              <input type="tel" id="vp_phone" class="form-control" placeholder="숫자만 입력해 주세요" required>
            </div>
            <div class="form-group">
              <label for="vp_lang" class="form-label">어학능력 <span class="optional">(선택)</span></label>
              <input type="text" id="vp_lang" class="form-control" placeholder="가능 언어 및 수준 기재">
            </div>
          </div>
        </div>
        <!-- ================= E: 개인 봉사 신청 폼 ================= -->

        <!-- ================= S: 기업·단체 봉사 신청 폼 ================= -->
        <div class="tab-content" id="volunteer-group" style="display: none;">
          <div class="form-grid">
            <div class="form-group">
              <label for="vg_group_name" class="form-label">기업·단체명 <span class="required">*</span></label>
              <input type="text" id="vg_group_name" class="form-control" placeholder="기업 또는 단체명을 입력해 주세요">
            </div>
            <div class="form-group">
              <label for="vg_manager" class="form-label">담당자 성명 <span class="required">*</span></label>
              <input type="text" id="vg_manager" class="form-control" placeholder="담당자 이름을 입력해 주세요">
            </div>
            <div class="form-group">
              <label for="vg_phone" class="form-label">담당자 연락처 <span class="required">*</span></label>
              <input type="tel" id="vg_phone" class="form-control" placeholder="숫자만 입력해 주세요">
            </div>
            <div class="form-group">
              <label for="vg_count" class="form-label">참여 예정 인원수 <span class="required">*</span></label>
              <input type="number" id="vg_count" class="form-control" placeholder="명" min="1">
            </div>
          </div>
        </div>
        <!-- ================= E: 기업·단체 봉사 신청 폼 ================= -->

        <!-- ================= S: 공통 희망 일정/시간 정보 ================= -->
        <div class="form-section-divider"></div>
        <div class="form-grid mt-4">
          <div class="form-group">
            <label for="v_date" class="form-label">희망 봉사 일자 <span class="required">*</span></label>
            <input type="date" id="v_date" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="v_time" class="form-label">희망 시간 <span class="required">*</span></label>
            <select id="v_time" class="form-control" required>
              <option value="">시간을 선택해 주세요</option>
              <option value="morning">오전 (09:00 - 13:00)</option>
              <option value="afternoon">오후 (13:00 - 18:00)</option>
              <option value="full">종일 (09:00 - 18:00)</option>
            </select>
          </div>
        </div>
        <!-- ================= E: 공통 희망 일정/시간 정보 ================= -->

        <!-- S: VMS 연계 안내 고지 (기획서 사양 필수 노출) -->
        <div class="notice-info-box mt-6">
          <p class="notice-text">
            ⚠️ <strong>VMS 연계 안내:</strong> 봉사활동 시간은 VMS(사회복지자원봉사인증관리시스템) 가입 및 등록 후 확인 가능합니다.
          </p>
        </div>
        <!-- E: VMS 연계 안내 고지 -->

      </form>
    </div>
    <!-- E: 팝업 본문 -->

    <!-- S: 팝업 푸터 -->
    <div class="modal-footer">
      <button type="button" class="btn btn-outline modal-close-btn">취소</button>
      <button type="submit" form="volunteerForm" class="btn btn-primary">신청하기</button>
    </div>
    <!-- E: 팝업 푸터 -->

  </div>
</div>
