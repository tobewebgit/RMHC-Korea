<!-- MP_P_01: 후원금 변경 팝업 (금액 유효성 에러 메시지 영역 포함) -->
<div class="modal-overlay" id="modal-mp_p_02">
  <div class="modal-container modal-container--payment mypage">
    
    <!-- S: 팝업 헤더 -->
    <div class="modal-header">
      <h3 class="modal-title">후원금 변경</h3>
      <button type="button" class="modal-close-btn-circle" aria-label="닫기">
        <span class="close-icon"></span>
      </button>
    </div>
    <!-- E: 팝업 헤더 -->

    <!-- S: 팝업 본문 -->
    <div class="modal-body">
      <div class="current-payment-card pay-change">
        <span class="current-payment-title">현재 후원금</span>
        <span class="current-payment-value">20,000원</span>
      </div>

      <div class="payment-tabs-grid">
        <button type="button" class="btn btn-outline">
          <span>10,000원</span>
        </button>
        <button type="button" class="btn btn-outline">
          <span>20,000원</span>
        </button>
        <button type="button" class="btn btn-outline">
          <span>30,000원</span>
        </button>
        <button type="button" class="btn btn-outline">
          <span>50,000원</span>
        </button>
        <button type="button" class="btn btn-outline">
          <span>70,000원</span>
        </button>
        <button type="button" class="btn btn-outline">
          <span>100,000원</span>
        </button>
      </div>

      <div class="direct-input-wrap">
        <button type="button" class="btn btn-outline btn-direct-input">
          <span>직접 입력</span>
        </button>
        <div class="direct-input-chip" style="display: none;">
          <input type="text" class="input_amount" placeholder="직접 입력" name="txt_price" id="txt_price" autocomplete="off" maxlength="9">
          <span class="unit">원</span>
        </div>
      </div>
      <div class="direct-amount-warning" style="display: none;">
        ⓘ 최소 후원 금액은 10,000원 이상 입력해 주세요.
      </div>

      <ul class="payment-apply-notice">
        <li>변경된 결제수단은 다음 결제일부터 적용됩니다.</li>
        <li>최소 후원 금액은 10,000원 이상 입력해 주세요.</li>
      </ul>
    </div>

    <!-- E: 팝업 본문 -->

    <!-- S: 팝업 푸터 -->
    <div class="modal-footer">
      <button type="button" class="btn btn-outline primary">취소하기</button>
      <button type="submit" form="donationAmountForm" class="btn btn-primary">변경하기</button>
    </div>
    <!-- E: 팝업 푸터 -->

  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('modal-mp_p_02');
    if (!modal) return;

    const amountBtns = modal.querySelectorAll('.payment-tabs-grid .btn');
    const directInputBtn = modal.querySelector('.direct-input-wrap .btn-direct-input');
    const directInputChip = modal.querySelector('.direct-input-wrap .direct-input-chip');
    const directInput = modal.querySelector('.direct-input-wrap .input_amount');
    const amountWarning = modal.querySelector('.direct-amount-warning');

    // 천단위 콤마 포맷팅 함수
    function formatNumber(num) {
      return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    // 최소 금액 검증 함수
    function validateDirectInput() {
      if (!directInput || !amountWarning) return;
      const rawVal = directInput.value.replace(/[^0-9]/g, '');
      const numVal = parseInt(rawVal, 10);
      
      if (!numVal) {
        amountWarning.style.display = 'none';
      } else if (numVal < 10000) {
        amountWarning.style.display = 'block';
      } else {
        amountWarning.style.display = 'none';
      }
    }

    // 금액 버튼 클릭 (직접 입력 버튼 제외)
    amountBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        // 모든 금액 버튼 초기화
        amountBtns.forEach(b => {
          b.classList.remove('btn-primary');
          b.classList.add('btn-outline');
        });
        // 현재 버튼 활성화
        this.classList.remove('btn-outline');
        this.classList.add('btn-primary');

        // 직접 입력 초기화 및 버튼으로 복귀
        if (directInputChip && directInputBtn) {
          directInputChip.style.display = 'none';
          if (directInput) directInput.value = '';
          directInputBtn.style.display = ''; 
          if (amountWarning) amountWarning.style.display = 'none';
        }
      });
    });

    // 직접 입력 버튼 클릭 시
    if (directInputBtn) {
      directInputBtn.addEventListener('click', function() {
        // 모든 금액 버튼 초기화
        amountBtns.forEach(b => {
          b.classList.remove('btn-primary');
          b.classList.add('btn-outline');
        });

        // 입력창 노출 및 포커스
        this.style.display = 'none';
        if (directInputChip) {
          directInputChip.style.display = 'inline-flex';
          if (directInput) {
            directInput.focus();
            validateDirectInput();
          }
        }
      });
    }

    // 직접 입력 인풋 이벤트 (숫자만, 3자리 콤마, 검증)
    if (directInput) {
      directInput.addEventListener('input', function(e) {
        let val = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = val ? formatNumber(parseInt(val, 10)) : '';
        validateDirectInput();
      });
    }
  });
</script>
