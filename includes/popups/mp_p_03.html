<!-- MP_P_03: 결제수단 변경 팝업 -->
<div class="modal-overlay" id="modal-mp_p_03">
  <div class="modal-container modal-container--payment mypage">
    
    <!-- S: 팝업 헤더 -->
    <div class="modal-header">
      <h3 class="modal-title">결제수단</h3>
      <button type="button" class="modal-close-btn" aria-label="닫기">&times;</button>
    </div>
    <!-- E: 팝업 헤더 -->

    <!-- S: 팝업 본문 -->
    <div class="modal-body">
      <!-- 현재 결제수단 카드 상자 -->
      <div class="current-payment-card">
        <span class="current-payment-title">현재 결제수단</span>
        <span class="current-payment-value">신용카드 (국민/5678)</span>
      </div>

      <!-- 결제수단 선택 탭 5종 -->
      <div class="payment-tabs-grid">
        <button type="button" class="payment-tab-btn" data-tab-target="pay-kakao">
          <img src="/src/images/common/icon_kakao_pay.png" alt="카카오페이" class="payment-tab-icon">
          <span>카카오페이</span>
        </button>
        <button type="button" class="payment-tab-btn" data-tab-target="pay-naver">
          <img src="/src/images/common/icon_naver_pay.png" alt="네이버페이" class="payment-tab-icon">
          <span>네이버페이</span>
        </button>
        <button type="button" class="payment-tab-btn" data-tab-target="pay-toss">
          <img src="/src/images/common/icon_toss_pay.png" alt="토스페이" class="payment-tab-icon">
          <span>토스페이</span>
        </button>
        <button type="button" class="payment-tab-btn active" data-tab-target="pay-card">
          <span>신용카드</span>
        </button>
        <button type="button" class="payment-tab-btn" data-tab-target="pay-cms">
          <span>CMS 자동이체</span>
        </button>
      </div>

      <!-- 탭 본문 폼 입력 섹션 -->
      <div class="payment-tab-contents">
        <!-- 신용카드 결제 정보 입력 폼 -->
        <div class="payment-tab-content active" id="pay-card">
          <p class="payment-form-section-title">결제정보를 입력해주세요.</p>
          
          <form id="paymentMethodForm" class="payment-info-form-box">
            <!-- 카드사명 -->
            <div class="payment-form-row">
              <label for="pm_card_company" class="payment-form-label">*card_company</label>
              <div class="payment-form-field">
                <select id="pm_card_company" class="form-control selectbox" required>
                  <option value="" disabled selected>카드사를 선택해 주세요.</option>
                  <option value="국민">국민카드</option>
                  <option value="하나">하나카드</option>
                  <option value="신한">신한카드</option>
                  <option value="삼성">삼성카드</option>
                </select>
              </div>
            </div>

            <!-- 카드번호 -->
            <div class="payment-form-row">
              <label for="pm_card_number" class="payment-form-label">*카드번호</label>
              <div class="payment-form-field">
                <input type="text" id="pm_card_number" class="form-control" placeholder="카드번호 (숫자만 입력)" pattern="[0-9]*" required>
              </div>
            </div>

            <!-- 카드 유효기간 -->
            <div class="payment-form-row">
              <label class="payment-form-label">*카드 유효기간</label>
              <div class="payment-form-field double-select">
                <select id="pm_exp_month" class="form-control selectbox" aria-label="유효기간 월" required>
                  <option value="" disabled selected>월</option>
                  <option value="01">01</option>
                  <option value="02">02</option>
                  <option value="03">03</option>
                  <option value="04">04</option>
                  <option value="05">05</option>
                  <option value="06">06</option>
                  <option value="07">07</option>
                  <option value="08">08</option>
                  <option value="09">09</option>
                  <option value="10">10</option>
                  <option value="11">11</option>
                  <option value="12">12</option>
                </select>
                <select id="pm_exp_year" class="form-control selectbox" aria-label="유효기간 년" required>
                  <option value="" disabled selected>년</option>
                  <option value="26">2026</option>
                  <option value="27">2027</option>
                  <option value="28">2028</option>
                  <option value="29">2029</option>
                  <option value="30">2030</option>
                  <option value="31">2031</option>
                  <option value="32">2032</option>
                  <option value="33">2033</option>
                  <option value="34">2034</option>
                  <option value="35">2035</option>
                </select>
              </div>
            </div>

            <!-- 카드소유자명 -->
            <div class="payment-form-row">
              <label for="pm_owner_name" class="payment-form-label">*카드소유자명</label>
              <div class="payment-form-field">
                <input type="text" id="pm_owner_name" class="form-control" placeholder="Placeholder" required>
              </div>
            </div>

            <!-- 카드소유자 생년월일 -->
            <div class="payment-form-row align-start">
              <label for="pm_owner_birth" class="payment-form-label">*카드소유자<br>생년월일</label>
              <div class="payment-form-field">
                <input type="text" id="pm_owner_birth" class="form-control" placeholder="예)19880101 (숫자만 입력)" pattern="[0-9]*" required>
                <p class="form-helper-note mt-2">카드 소유자 확인을 위해 사용됩니다.</p>
              </div>
            </div>
          </form>
        </div>

        <!-- 타 결제 탭들 (카카오/네이버/토스/CMS) 영역 - 차후 확장용 빈 프레임 -->
        <div class="payment-tab-content" id="pay-kakao" style="display: none;">
          <p class="payment-form-section-title">카카오페이 결제를 준비 중입니다.</p>
        </div>
        <div class="payment-tab-content" id="pay-naver" style="display: none;">
          <p class="payment-form-section-title">네이버페이 결제를 준비 중입니다.</p>
        </div>
        <div class="payment-tab-content" id="pay-toss" style="display: none;">
          <p class="payment-form-section-title">토스페이 결제를 준비 중입니다.</p>
        </div>
        <!-- CMS 자동이체 탭 내용 -->
        <div class="payment-tab-content" id="pay-cms" style="display: none;">
          <p class="payment-form-section-title">결제정보를 입력해주세요.</p>
          <div class="payment-info-form-box">
            
            <!-- 은행명 -->
            <div class="payment-form-row">
              <label class="payment-form-label">*은행명</label>
              <div class="payment-form-field">
                <select class="form-control selectbox">
                  <option value="" disabled selected>은행을 선택해 주세요.</option>
                  <option value="국민">KB국민은행</option>
                  <option value="신한">신한은행</option>
                  <option value="하나">하나은행</option>
                  <option value="우리">우리은행</option>
                  <option value="농협">NH농협은행</option>
                </select>
              </div>
            </div>

            <!-- 계좌번호 -->
            <div class="payment-form-row">
              <label class="payment-form-label">*계좌번호</label>
              <div class="payment-form-field">
                <input type="text" class="form-control" placeholder="계좌번호 (숫자만 입력)">
              </div>
            </div>

            <!-- 예금주명 -->
            <div class="payment-form-row">
              <label class="payment-form-label">*예금주명</label>
              <div class="payment-form-field">
                <input type="text" class="form-control" placeholder="예금주명을 입력해 주세요.">
              </div>
            </div>

            <!-- 생년월일 -->
            <div class="payment-form-row">
              <label class="payment-form-label">*생년월일</label>
              <div class="payment-form-field">
                <input type="text" class="form-control" placeholder="예)19880101 (숫자만 입력)">
              </div>
            </div>

            <!-- 출금동의 서명 -->
            <div class="payment-form-row align-start">
              <label class="payment-form-label">*출금동의 서명</label>
              <div class="payment-form-field">
                <p class="form-helper-note" style="margin-bottom: 1.2rem; line-height: 1.5; font-size: 1.5rem; color: var(--text-secondary);">
                  자동이체를 위해 출금 동의가 필요합니다.<br>
                  아래 서명을 진행해 주세요.<br>
                  마우스를 올린 후 클릭한 상태에서 서명해 주세요.
                </p>
                <!-- 서명 영역 보드 (W: 41.6rem, H: 12rem) -->
                <div class="signature-pad-wrapper" style="position: relative; max-width: 41.6rem;">
                  <div class="signature-pad-canvas-box" style="width: 100%; height: 12rem; background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); box-sizing: border-box; cursor: crosshair; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 1.5rem;">
                    <span>여기에 서명해 주세요</span>
                  </div>
                  <div style="text-align: right; margin-top: 0.8rem;">
                    <button type="button" class="btn-signature-clear" style="background: none; border: none; font-family: var(--font-pretendard); font-size: 1.6rem; color: var(--text-secondary); text-decoration: underline; cursor: pointer;">다시 서명하기</button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <p class="payment-apply-notice">변경된 결제수단은 다음 결제일부터 적용됩니다.</p>
    </div>
    <!-- E: 팝업 본문 -->

    <!-- S: 팝업 푸터 (CTA 버튼) -->
    <div class="modal-footer payment-popup-footer">
      <button type="button" class="btn btn-outline btn-popup-cancel">취소하기</button>
      <button type="submit" form="paymentMethodForm" class="btn btn-primary btn-popup-submit">결제수단 변경하기</button>
    </div>
    <!-- E: 팝업 푸터 -->

  </div>
</div>
