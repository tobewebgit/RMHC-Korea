<!-- MP_P_01: 후원금 변경 팝업 (금액 유효성 에러 메시지 영역 포함) -->
<div class="modal-overlay" id="modal-mp_p_01">
  <div class="modal-container">
    
    <!-- S: 팝업 헤더 -->
    <div class="modal-header">
      <h3 class="modal-title">후원 금액 변경</h3>
      <button type="button" class="modal-close-btn" aria-label="닫기">&times;</button>
    </div>
    <!-- E: 팝업 헤더 -->

    <!-- S: 팝업 본문 -->
    <div class="modal-body">
      <form id="donationAmountForm" class="donation-amount-form">
        
        <!-- 후원 종류 표시 정보 (정기후원 등) -->
        <p class="form-helper-desc mb-4">
          매월 따뜻한 후원금을 변경하여 아이들의 치료를 지속적으로 도울 수 있습니다.
        </p>

        <!-- 금액 선택형 버튼 목록 -->
        <div class="form-grid gap-2 mb-4" style="grid-template-columns: repeat(3, 1fr);">
          <label class="custom-radio-card">
            <input type="radio" name="donation_preset" value="10000" checked>
            <span>10,000원</span>
          </label>
          <label class="custom-radio-card">
            <input type="radio" name="donation_preset" value="30000">
            <span>30,000원</span>
          </label>
          <label class="custom-radio-card">
            <input type="radio" name="donation_preset" value="50000">
            <span>50,000원</span>
          </label>
        </div>

        <!-- 금액 직접 입력 폼 -->
        <div class="form-group">
          <label for="custom_donation_amount" class="form-label">기타 금액 직접 입력 <span class="required">*</span></label>
          <div class="input-unit-wrap" style="position: relative;">
            <input type="number" id="custom_donation_amount" class="form-control" placeholder="금액을 입력해 주세요" min="10000" step="1000" style="padding-right: 4rem;">
            <span class="input-unit" style="position: absolute; right: 1.6rem; top: 50%; transform: translateY(-50%); font-size: 1.6rem; color: var(--text-secondary);">원</span>
          </div>
          
          <!-- S: 기획서 규정 금액 에러 메시지 영역 (최소 10,000원 미만 시 동적 노출용) -->
          <p class="error-text mt-2" id="amount-error-msg" style="display: none; color: var(--primary); font-size: var(--text-sm); font-weight: 500;">
            최소 후원 금액은 10,000원 이상 입력해 주세요.
          </p>
          <!-- E: 금액 에러 메시지 영역 -->
        </div>

      </form>
    </div>
    <!-- E: 팝업 본문 -->

    <!-- S: 팝업 푸터 -->
    <div class="modal-footer">
      <button type="button" class="btn btn-outline modal-close-btn">취소</button>
      <button type="submit" form="donationAmountForm" class="btn btn-primary">변경 사항 저장</button>
    </div>
    <!-- E: 팝업 푸터 -->

  </div>
</div>
