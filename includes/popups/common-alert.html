<!-- S: 공통 알럿/컨펌 모달 팝업 -->
<div class="modal-overlay" id="modal-common-alert" aria-hidden="true">
  <div class="modal-container common-alert-container">
    <button type="button" class="modal-close-btn-circle" id="btn-common-alert-close" aria-label="닫기">
      <span class="close-icon"></span>
    </button>

    <div class="common-alert__content">
      <div class="common-alert__body">
        <div class="common-alert__text-group">
          <h3 class="common-alert__title" id="common-alert-title"></h3>
          <p class="common-alert__desc" id="common-alert-desc" style="display: none;"></p>
        </div>
      </div>

      <div class="common-alert__footer" id="common-alert-footer">
        <button type="button" class="btn btn-alert-cancel common-alert__cancel-btn" id="btn-common-alert-cancel" style="display: none;">
          <span>취소하기</span>
        </button>
        <button type="button" class="btn btn-primary common-alert__confirm-btn" id="btn-common-alert-confirm">
          <span>확인</span>
        </button>
      </div>

    </div>
  </div>
</div>
<!-- E: 공통 알럿/컨펌 모달 팝업 -->
