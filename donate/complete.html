<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="재단법인 한국로날드맥도날드하우스(RMHC Korea) 후원 완료 페이지입니다. 환아와 가족을 위한 따뜻한 나눔에 진심으로 감사드립니다.">
  <title>후원완료 - 한국로날드맥도날드하우스</title>
  <link rel="stylesheet" href="/src/css/style.css">
  <link rel="stylesheet" href="/src/css/donate.css">
</head>
<body>

  <!-- 웹 접근성 스킵 네비게이션 -->
  <a href="#main-content" class="skip-nav">본문 바로가기</a>

  <!-- 헤더 공통 영역 인클루드 -->
  <load ="src/includes/header.html" />

  <div class="page-wrapper">
    <main id="main-content" class="donate-wrapper">
      
      <!-- 후원완료 카드 섹션 -->
      <section class="donate-card complete-card">
        <!-- 체크 아이콘 (SVG) -->
        <div class="complete-icon-box" aria-hidden="true">
          <svg class="complete-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>

        <h1 class="complete-title">후원이 완료되었습니다</h1>
        <p class="complete-subtitle">환아와 가족들에게 따뜻한 내일을 선물해주셔서 대단히 감사합니다.</p>

        <!-- 후원 내역 요약 테이블 -->
        <h2 class="donate-section-title" style="text-align: left; font-size: 1.8rem; margin-bottom: var(--spacing-4);">후원 내역 확인</h2>
        <table class="summary-table" aria-label="후원 내역 요약 정보">
          <tbody>
            <tr>
              <th scope="row">후원 구분</th>
              <td id="summaryType">정기후원</td>
            </tr>
            <tr>
              <th scope="row">후원자명</th>
              <td id="summaryName">홍길동</td>
            </tr>
            <tr>
              <th scope="row">후원 내역</th>
              <td id="summaryDetail">매월 10,000 원</td>
            </tr>
            <tr>
              <th scope="row">결제/전송 수단</th>
              <td id="summaryMethod">신용카드 (결제일: 매월 5일)</td>
            </tr>
            <tr>
              <th scope="row">영수증 신청 여부</th>
              <td id="summaryReceipt">신청함 (주민등록번호 발급)</td>
            </tr>
          </tbody>
        </table>

        <!-- 비회원 후원 완료 시 안내 문구 상자 -->
        <div class="complete-notice">
          <h3 class="complete-notice-title">비회원 후원자 안내</h3>
          <p>비회원으로 후원하신 경우, 휴대폰 인증을 통해 후원 내역을 간편하게 조회하실 수 있습니다.</p>
        </div>

        <!-- 하단 이동 버튼 -->
        <div class="d-flex flex-col gap-3" style="width: 100%;">
          <a href="/mypage/donation-status.html" class="btn btn-primary" style="min-height: 5.2rem; font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; justify-content: center;">나의 후원 현황 조회</a>
          <a href="/" class="btn btn-secondary" style="min-height: 5.2rem; font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; justify-content: center;">홈으로 돌아가기</a>
        </div>
      </section>

    </main>

    <!-- 푸터 공통 영역 인클루드 -->
    <load ="src/includes/footer.html" />
  </div>

  <script type="module" src="/src/js/main.js"></script>

  <!-- 가상의 데이터 바인딩 스크립트 (쿼리 스트링 파라미터가 있을 경우 세팅) -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 실제 구현 시 백엔드 혹은 쿼리스트링 연계 처리 (여기서는 데모용 디폴트 제공 및 파라미터 매핑)
      const params = new URLSearchParams(window.location.search);
      
      // 기부 종류 파악 (간단히 URL referrer 또는 내부 로직)
      // 예: referrer에 goods가 포함되어 있으면 물품후원 예시 출력
      if (document.referrer.includes('goods.html')) {
        document.getElementById('summaryType').textContent = '물품후원';
        document.getElementById('summaryDetail').textContent = '위생 및 위생용품 (락토핏 유산균 10 박스)';
        document.getElementById('summaryMethod').textContent = '택배 발송';
        document.getElementById('summaryReceipt').textContent = '신청함 (주민등록번호 발급)';
      } else if (document.referrer.includes('one-time.html')) {
        document.getElementById('summaryType').textContent = '일시후원';
        document.getElementById('summaryDetail').textContent = '일시 기부 30,000 원';
        document.getElementById('summaryMethod').textContent = '실시간 계좌이체';
      }
    });
  </script>
</body>
</html>
