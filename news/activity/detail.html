            <div class="kv-text-wrap">
              <h1 class="kv-title">활동 소식</h1>

          <div class="news-detail-container activity-detail-page">
            <header class="detail-header">
              <div class="detail-title-row">
                <span class="detail-badge">New</span>

            <!-- 상세 내용 -->
            <div class="detail-contents">
              <p class="detail-text">
                RMHC 양산하우스에서 진행된 1월 핸드크래프트 클래스 소식을 전해드립니다. 알록달록한 꽃과 흙이 어우러진 1월, 가족들과 함께 하루를 포근하게 채우는 시간을 보냈습니다. 더 많은 이야기는 RMHC Korea 공식 인스타그램에서 확인해보세요.
              </p>
              <div class="detail-img-wrap">
                <img src="/src/images/news/img_activity_view.png" alt="양산하우스 핸드크래프트 클래스 진행 사진" width="800" height="808" loading="lazy" />
              </div>
            </div>

            <!-- 첨부파일 영역 -->

                <a href="#" class="nav-btn next-btn">
