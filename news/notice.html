<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RMHC Korea - 공지"
    />
    <title>공지사항 | RMHC Korea</title>
    <link rel="stylesheet" href="/src/css/common.css" />
    <link rel="stylesheet" href="/src/css/news.css" />
  </head>
  <body>
    <!-- S: Skip Navigation -->
    <a href="#main-content" class="skip-nav">본문 바로가기</a>
    <!-- E: Skip Navigation -->

    <!-- 헤더 공통 영역 인클루드 -->
    <load ="/includes/header.html" />

    <div class="page-wrapper">
      <main id="main-content">
        <div class="inner-container">
          <!-- KV 영역 -->
          <section class="news-kv">
            <div class="kv-img-wrap"><img src="/src/images/news/img_notice_kv.png" alt="" class="kv-img" /></div>
            <div class="kv-text-wrap">
              <h1 class="kv-title">공지</h1>
              <p class="kv-desc">더 나은 내일을 향한 재단의 새로운 소식과&#10;주요 정보를 전해드립니다.</p>
            </div>
          </section>

          <!-- 리스트 및 검색/페이지네이션 컨테이너 -->
          <div class="notice-list-container">
            <div class="news-list-header">
              <p class="list-total">총 게시물 <span>8</span>개</p>
              <div class="search-field">
                <input type="text" class="search-input" placeholder="검색어를 입력하세요" aria-label="검색어 입력" />
                <button type="button" class="search-btn" aria-label="검색"></button>
              </div>
            </div>

            <!-- 공지 리스트 -->
            <div class="notice-list">
              <!-- Item 1 -->
              <a href="/news/notice/detail.html" class="notice-item">
                <div class="notice-left">
                  <img src="/src/images/common/icon_megaphone.png" alt="" class="notice-megaphone" />
                  <h3 class="notice-title">제 11회 울림백일장 심사 결과 발표</h3>
                </div>
                <div class="notice-right">
                  <img src="/src/images/common/icon_badge_new.png" alt="New" class="notice-new-badge" />
                  <span class="notice-date">2025-10-02</span>
                  <img src="/src/images/common/icon_arrow_right.png" alt="" class="notice-arrow" width="22" height="16" />
                </div>
              </a>

              <!-- Item 2 -->
              <a href="/news/notice/detail.html" class="notice-item">
                <div class="notice-left">
                  <h3 class="notice-title">제 11회 울림백일장 공고 발표</h3>
                </div>
                <div class="notice-right">
                  <span class="notice-date">2025-04-23</span>
                  <img src="/src/images/common/icon_arrow_right.png" alt="" class="notice-arrow" width="22" height="16" />
                </div>
              </a>

              <!-- Item 3 -->
              <a href="/news/notice/detail.html" class="notice-item">
                <div class="notice-left">
                  <h3 class="notice-title">제 11회 울림백일장 심사 결과 발표</h3>
                </div>
                <div class="notice-right">
                  <span class="notice-date">2024-10-11</span>
                  <img src="/src/images/common/icon_arrow_right.png" alt="" class="notice-arrow" width="22" height="16" />
                </div>
              </a>

              <!-- Item 4 -->
              <a href="/news/notice/detail.html" class="notice-item">
                <div class="notice-left">
                  <h3 class="notice-title">제 11회 울림백일장 공고 발표</h3>
                </div>
                <div class="notice-right">
                  <span class="notice-date">2025-04-23</span>
                  <img src="/src/images/common/icon_arrow_right.png" alt="" class="notice-arrow" width="22" height="16" />
                </div>
              </a>
            </div>

            <!-- 페이지네이션 (마이페이지 공통 코드 재사용) -->
            <div class="pagination">
              <div class="page-group-arrow">
                <button type="button" class="page-btn page-arrow page-first" aria-label="처음 페이지"></button>
                <button type="button" class="page-btn page-arrow page-prev" aria-label="이전 페이지"></button>
              </div>
              <div class="page-group-numbers">
                <button type="button" class="page-btn active">1</button>
                <button type="button" class="page-btn">2</button>
                <button type="button" class="page-btn">3</button>
                <button type="button" class="page-btn">4</button>
                <button type="button" class="page-btn">5</button>
              </div>
              <div class="page-group-arrow">
                <button type="button" class="page-btn page-arrow page-next" aria-label="다음 페이지"></button>
                <button type="button" class="page-btn page-arrow page-last" aria-label="마지막 페이지"></button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <load ="/includes/footer.html" />
    <script type="module" src="/src/js/common.js"></script>
  </body>
</html>
