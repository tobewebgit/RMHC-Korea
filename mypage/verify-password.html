<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="재단법인 한국로날드맥도날드하우스(RMHC Korea) 마이페이지 비밀번호 재확인 페이지입니다. 안전한 개인정보 관리를 위해 비밀번호를 확인해 주십시오.">
  <title>비밀번호 재확인 - RMHC Korea</title>
  <link rel="stylesheet" href="/src/css/style.css">
  <link rel="stylesheet" href="/src/css/mypage.css">
</head>
<body>

  <!-- 웹 접근성 스킵 네비게이션 -->
  <a href="#mypage-main-content" class="skip-nav">본문 바로가기</a>

  <!-- 헤더 공통 영역 인클루드 -->
  <load ="src/includes/header.html" />

  <div class="mypage-wrapper">
    <!-- 마이페이지 히어로 타이틀 -->
    <section class="mypage-hero" aria-labelledby="mypage-hero-title">
      <div class="container">
        <h1 class="mypage-hero__title" id="mypage-hero-title">개인정보 수정</h1>
        <p class="mypage-hero__desc">회원님의 소중한 개인정보를 안전하게 보호합니다.</p>
      </div>
    </section>

    <!-- 마이페이지 레이아웃 컨테이너 -->
    <div class="mypage-container">
      <div class="mypage-layout">
        <!-- LNB 공통 영역 인클루드 -->
        <load ="src/includes/mypage-lnb.html" />

        <!-- 마이페이지 본문 콘텐츠 -->
        <main class="mypage-content" id="mypage-main-content">
          
          <div class="verify-card">
            <h2 class="verify-card__title">비밀번호 재확인</h2>
            <p class="verify-card__desc">
              회원님의 개인정보를 안전하게 보호하기 위해<br>
              비밀번호를 다시 한 번 입력해 주셔야 합니다.
            </p>

            <form action="/mypage/profile.html" method="GET" class="verify-form" novalidate>
              <!-- 아이디 (읽기 전용) -->
              <div class="form-group">
                <label for="verifyId" class="form-label">아이디</label>
                <input type="text" id="verifyId" class="form-control info-readonly" value="rmhc_user" readonly tabindex="-1" aria-readonly="true">
              </div>

              <!-- 비밀번호 입력 -->
              <div class="form-group">
                <label for="verifyPassword" class="form-label">비밀번호</label>
                <input type="password" id="verifyPassword" class="form-control" placeholder="비밀번호를 입력하세요" required aria-required="true" autocomplete="current-password">
                <p class="form-helper" id="passwordHelper">비밀번호가 일치하지 않는 경우 다음 단계로 진행할 수 없습니다.</p>
              </div>

              <!-- 버튼 영역 -->
              <div class="mypage-form-actions mt-8">
                <a href="/mypage.html" class="btn btn-outline" role="button">취소</a>
                <button type="submit" class="btn btn-primary">확인</button>
              </div>
            </form>
          </div>

        </main>
      </div>
    </div>
  </div>

  <!-- 푸터 공통 영역 인클루드 -->
  <load ="src/includes/footer.html" />

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
