<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RMHC Korea - 비밀번호 재확인"
    />
    <title>비밀번호 재확인 - RMHC Korea</title>
    <link rel="stylesheet" href="/src/css/common.css" />
    <link rel="stylesheet" href="/src/css/login.css" />
  </head>
  <body>
    <!-- 웹 접근성 스킵 네비게이션 -->
    <a href="#mypage-main-content" class="skip-nav">본문 바로가기</a>

    <!-- 헤더 공통 영역 인클루드 -->
    <load ="/includes/header.html" />

<div class="page-wrapper">
      <main id="main-content" class="login-section">
        <div class="login-card">
          <h1 class="login-title">비밀번호 재확인</h1>
          <p class="login-desc">
            회원님의 개인정보 보호를 위해<br>마이페이지 접근 전 비밀번호를 다시 한 번 입력해 주세요.
          </p>

          <form action="#" method="POST" class="login-form">
            <!-- 비밀번호 입력 그룹 -->
            <div class="form-group">
              <label for="user-pw" class="form-label sr-only">비밀번호</label>
              <input
                type="password"
                id="user-pw"
                class="form-control"
                placeholder="비밀번호"
                required
              />
              <button
                type="button"
                class="eye-btn"
                aria-label="비밀번호"
                aria-pressed="false"
              ></button>
            </div>

            <div class="button-wrap">
              <button type="submit" class="btn btn-primary">
                비밀번호 확인
              </button>
            </div>
          </form>

        </div>
      </main>
    </div>

    <!-- 푸터 공통 영역 인클루드 -->
    <load ="/includes/footer.html" />

</body>
</html>
