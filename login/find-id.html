<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="재단법인 한국로날드맥도날드하우스(RMHC Korea) 아이디 찾기 페이지입니다. 본인인증을 통해 안전하게 아이디를 찾으실 수 있습니다."
    />
    <title>아이디 찾기 - RMHC Korea</title>
    <link rel="stylesheet" href="/src/css/common.css" />
    <link rel="stylesheet" href="/src/css/login.css" />
  </head>
  <body>
    <!-- 웹 접근성 스킵 네비게이션 -->
    <a href="#main-content" class="skip-nav">본문 바로가기</a>

    <!-- 헤더 공통 영역 인클루드 -->
    <load ="/includes/header.html" />

    <div class="page-wrapper">
      <main id="main-content" class="login-section">
        <div class="login-card">
          <h1 class="login-title">아이디 찾기</h1>
          <p class="login-desc">
            회원 정보에 등록된 이름과 휴대폰 번호로<br />아이디를 확인하실 수
            있습니다.
          </p>

          <!-- 로그인 폼 -->
          <form action="#" method="POST" class="login-form">
            <div class="form-group">
              <label for="user-id" class="form-label sr-only">이름</label>
              <input
                type="text"
                id="user-id"
                class="form-control"
                placeholder="이름"
                required
                maxlength="15"
              />
            </div>

            <div class="form-group">
              <label for="user-pw" class="form-label sr-only">비밀번호</label>
              <input
                type="password"
                id="user-pw"
                class="form-control"
                placeholder="휴대폰번호 (숫자만 입력)"
                required
              />
            </div>

            <!-- 로그인 CTA 버튼 -->
            <button type="submit" class="btn btn-primary">아이디 확인</button>
          </form>

          <div class="line"></div>

          <div class="login-links">
            <a href="/login/reset-pw.html">비밀번호 재설정</a>
            <a href="/join.html">회원가입</a>
          </div>
        </div>
      </main>

      <!-- 푸터 공통 영역 인클루드 -->
      <load ="/includes/footer.html" />
    </div>

    <script type="module" src="/src/js/common.js"></script>
  </body>
</html>
