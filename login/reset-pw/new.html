<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="재단법인 한국로날드맥도날드하우스(RMHC Korea) 새 비밀번호 설정 페이지입니다."
    />
    <title>새 비밀번호 설정 - RMHC Korea</title>
    <link rel="stylesheet" href="/src/css/common.css" />
    <link rel="stylesheet" href="/src/css/login.css" />
  </head>
  <body>
    <!-- 웹 접근성 스킵 네비게이션 -->
    <a href="#main-content" class="skip-nav">본문 바로가기</a>

    <!-- 헤더 공통 영역 인클루드 -->
    <load ="/includes/header.html" />

    <div class="page-wrapper">
      <main id="main-content" class="login-section">
        <div class="login-card">
          <h1 class="login-title">새 비밀번호 설정</h1>
          <p class="login-desc">새로운 비밀번호를 입력해 주세요.</p>

          <h2 class="user-info">로날드님 (donald04)</h2>

          <form action="#" method="POST" class="login-form">
            <!-- 비밀번호 입력 그룹 -->
            <div class="form-group">
              <label for="user-pw" class="form-label sr-only">비밀번호</label>
              <input
                type="password"
                id="user-pw"
                class="form-control"
                placeholder="비밀번호"
                required
              />
              <button
                type="button"
                class="eye-btn"
                aria-label="비밀번호"
                aria-pressed="false"
              ></button>
            </div>

            <!-- 이름 입력 그룹 -->
            <div class="form-group">
              <label for="user-pw2" class="form-label sr-only"
                >비밀번호 확인</label
              >
              <input
                type="password"
                id="user-pw2"
                class="form-control"
                placeholder="비밀번호 확인"
                required
              />
              <button
                type="button"
                class="eye-btn"
                aria-label="비밀번호 확인"
                aria-pressed="false"
              ></button>
            </div>

            <p class="helper-text">
              6~15자 영문(대소문자), 숫자, 특수문자를 포함해 주세요.
            </p>

            <div class="d-flex flex-col gap-3">
              <button type="submit" class="btn btn-primary">
                비밀번호 변경하기
              </button>
            </div>
          </form>
        </div>
      </main>

      <!-- 푸터 공통 영역 인클루드 -->
      <load ="/includes/footer.html" />
    </div>

    <script type="module" src="/src/js/common.js"></script>
  </body>
</html>
