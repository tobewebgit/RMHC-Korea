<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="재단법인 한국로날드맥도날드하우스(RMHC Korea) 비밀번호 재설정 페이지입니다. 아이디 확인 및 본인인증을 통해 비밀번호를 재설정할 수 있습니다."
    />
    <title>비밀번호 재설정 - RMHC Korea</title>
    <link rel="stylesheet" href="/src/css/common.css" />
    <link rel="stylesheet" href="/src/css/login.css" />
  </head>
  <body>
    <!-- 웹 접근성 스킵 네비게이션 -->
    <a href="#main-content" class="skip-nav">본문 바로가기</a>

    <!-- 헤더 공통 영역 인클루드 -->
    <load ="/includes/header.html" />

    <div class="page-wrapper">
      <main id="main-content" class="login-section">
        <div class="login-card">
          <h1 class="login-title">비밀번호 재설정</h1>
          <p class="login-desc">
            가입 시 등록한 정보로 본인 확인을 진행합니다.<br />휴대폰 인증을
            통해 안전하게 확인됩니다.
          </p>

          <form action="#" method="POST" class="login-form">
            <!-- 아이디 입력 그룹 -->
            <div class="form-group">
              <label for="user-id" class="form-label sr-only">아이디</label>
              <input
                type="text"
                id="user-id"
                class="form-control"
                placeholder="아이디"
                required
                maxlength="15"
              />
            </div>

            <!-- 이름 입력 그룹 -->
            <div class="form-group">
              <label for="user-name" class="form-label sr-only">이름</label>
              <input
                type="text"
                id="user-name"
                class="form-control"
                placeholder="이름"
                required
              />
            </div>

            <div class="button-wrap">
              <button type="submit" class="btn btn-primary">
                본인 인증하기
              </button>
            </div>
          </form>
          <div class="line"></div>

          <div class="login-links">
            <a href="/login/find-id.html">아이디 찾기</a>
            <a href="/join/join.html">회원가입</a>
          </div>
        </div>
      </main>
    </div>
    
    <!-- 푸터 공통 영역 인클루드 -->
    <load ="/includes/footer.html" />

</body>
</html>
