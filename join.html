<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="재단법인 한국로날드맥도날드하우스(RMHC Korea) 회원가입 페이지입니다. 개인 및 기업회원으로 가입하여 중증 환아와 가족을 위한 사랑의 쉼터 패밀리하우스 건립에 함께해 주세요.">
  <title>회원가입 - 한국로날드맥도날드하우스</title>
  <link rel="stylesheet" href="/src/css/style.css">
  <link rel="stylesheet" href="/src/css/join.css">
</head>
<body>

  <!-- 웹 접근성 스킵 네비게이션 -->
  <a href="#main-content" class="skip-nav">본문 바로가기</a>

  <!-- 헤더 공통 영역 인클루드 -->
  <load ="src/includes/header.html" />

  <div class="page-wrapper">
    <main id="main-content" class="join-container">
      
      <!-- 타이틀 영역 -->
      <section class="join-title-area">
        <h1 class="join-title">회원가입</h1>
        <p class="join-desc">로날드맥도날드하우스에 오신 것을 환영합니다.<br>가입하실 회원 유형을 선택해 주세요.</p>
      </section>

      <!-- 가입 유형 카드 그룹 -->
      <section class="join-type-section">
        <h2 class="hide-mobile" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">회원 유형 선택</h2>
        <div class="join-type-group">
          <!-- 개인회원 -->
          <div class="card card-hover join-type-card" onclick="location.href='/join/auth.html'" tabindex="0" role="button" aria-label="개인회원 가입하기">
            <div class="join-type-card__icon-wrap">
              <!-- 개인회원 아이콘 SVG -->
              <svg class="btn-sns-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
            <h3 class="join-type-card__title">개인회원</h3>
            <p class="join-type-card__desc">후원 참여, 봉사활동 신청 등<br>다양한 소식을 접하실 수 있습니다.</p>
            <a href="/join/auth.html" class="btn btn-primary" tabindex="-1">가입하기</a>
          </div>

          <!-- 기업회원 -->
          <div class="card card-hover join-type-card" onclick="location.href='/join/form.html?type=corporate'" tabindex="0" role="button" aria-label="기업회원 가입하기">
            <div class="join-type-card__icon-wrap">
              <!-- 기업회원 아이콘 SVG -->
              <svg class="btn-sns-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
              </svg>
            </div>
            <h3 class="join-type-card__title">기업/단체회원</h3>
            <p class="join-type-card__desc">기업 및 기관 파트너십을 맺어<br>사회공헌 캠페인에 함께 참여합니다.</p>
            <a href="/join/form.html?type=corporate" class="btn btn-secondary" tabindex="-1">가입하기</a>
          </div>
        </div>
      </section>

      <!-- 간편 회원가입 섹션 -->
      <section class="sns-join-section">
        <div class="sns-join-section-wrap">
          <h2 class="sns-join-title">SNS 계정으로 간편하게 가입하기</h2>
        </div>
        <div class="sns-join-buttons">
          <!-- 카카오 -->
          <a href="#" class="btn-sns btn-sns--kakao" aria-label="카카오 계정으로 가입">
            <svg class="btn-sns-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3C6.477 3 2 6.477 2 10.75c0 2.72 1.838 5.112 4.6 6.42-.18.66-.65 2.38-.74 2.74-.1.39.15.38.31.28.13-.08 2.02-1.37 2.83-1.92.33.09.68.14 1 .14 5.523 0 10-3.477 10-7.75S17.523 3 12 3z"/>
            </svg>
          </a>
          <!-- 네이버 -->
          <a href="#" class="btn-sns btn-sns--naver" aria-label="네이버 계정으로 가입">
            <svg class="btn-sns-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16.2 3H21v18h-4.8l-7.4-10.7V21H4V3h4.8l7.4 10.7V3z"/>
            </svg>
          </a>
          <!-- 애플 -->
          <a href="#" class="btn-sns btn-sns--apple" aria-label="애플 계정으로 가입">
            <svg class="btn-sns-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.57 2.95-1.39z"/>
            </svg>
          </a>
        </div>
      </section>

    </main>

    <!-- 푸터 공통 영역 인클루드 -->
    <load ="src/includes/footer.html" />
  </div>

  <script type="module" src="/src/js/common.js"></script>
</body>
</html>
