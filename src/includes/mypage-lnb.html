<script>
  (function() {
    document.addEventListener('DOMContentLoaded', function() {
      var path = window.location.pathname;
      var links = document.querySelectorAll('.mypage-lnb__link');
      
      links.forEach(function(link) {
        var href = link.getAttribute('href');
        var isMatch = false;
        
        if (href === '/mypage.html' && (path === '/mypage.html' || path === '/mypage' || path === '/')) {
          isMatch = true;
        } else if (href !== '/mypage.html') {
          var cleanPath = path.replace(/\/$/, "");
          var cleanHref = href.replace(/\.html$/, "");
          
          if (cleanPath.indexOf(cleanHref) === 0) {
            isMatch = true;
          }
          if (cleanHref.indexOf('verify-password') !== -1 && cleanPath.indexOf('profile') !== -1) {
            isMatch = true;
          }
        }

        if (isMatch) {
          link.classList.add('is-active');
          link.setAttribute('aria-current', 'page');
        }
      });
    });
  })();
</script>
