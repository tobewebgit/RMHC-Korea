<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="한국로날드맥도날드하우스를 투명하고 정직하게 운영하는 이사진 및 감사단을 소개합니다." />
    <title>이사회 - 한국로날드맥도날드하우스</title>
    <link rel="stylesheet" href="/src/css/common.css" />
    <link rel="stylesheet" href="/src/css/about.css" />
  </head>
  <body>
    <!-- 웹 접근성 스킵 네비게이션 -->
    <a href="#main-content" class="skip-nav">본문 바로가기</a>

    <!-- 헤더 공통 영역 인클루드 -->
    <load ="/includes/header.html" />

    <div class="page-wrapper">
      <main id="main-content" class="about-board">
        <section class="board-kv" aria-labelledby="boardTitle">
          <picture>
            <source srcset="/src/images/about/img_board_kv_mo.png" media="(max-width: 768px)" />
            <img src="/src/images/about/img_board_kv.png" alt="이사회가 회의실에서 논의하는 모습" width="1848" height="500" fetchpriority="high" />
          </picture>
          <div class="board-kv__text" data-motion="fade-up" data-motion-once="true">
            <h1 id="boardTitle">이사회</h1>
            <p>아이와 가족의 더 나은 내일을 위해,<br />한국로날드맥도날드하우스의 방향을 함께 만들어가는 이사진을 소개합니다.</p>
          </div>
        </section>

        <section class="board-members" aria-label="이사회 구성원">
          <div class="inner-layout">
            <ul class="board-members__list">
              <li class="board-member" data-motion="fade-up" data-motion-delay="0.00">
                <figure>
                  <img class="board-member__photo" src="/src/images/about/img_board_1.png" alt="제프리 존스 이사장" loading="lazy" />
                  <figcaption>
                    <h2>제프리 존스 이사장</h2>
                    <p>주한 미국상공회의소<br class="mo-only" /> 이사장</p>
                  </figcaption>
                </figure>
              </li>
              <li class="board-member" data-motion="fade-up" data-motion-delay="0.15">
                <figure>
                  <img class="board-member__photo" src="/src/images/about/img_board_2.png" alt="안수인 이사" loading="lazy" />
                  <figcaption>
                    <h2>안수인 이사</h2>
                    <p>RMHC Korea 대표</p>
                  </figcaption>
                </figure>
              </li>
              <li class="board-member" data-motion="fade-up" data-motion-delay="0.30">
                <figure>
                  <img class="board-member__photo" src="/src/images/about/img_board_3.png" alt="김기원 이사" loading="lazy" />
                  <figcaption>
                    <h2>김기원 이사</h2>
                    <p>한국맥도날드 대표</p>
                  </figcaption>
                </figure>
              </li>
              <li class="board-member" data-motion="fade-up" data-motion-delay="0.45">
                <figure>
                  <img class="board-member__photo" src="/src/images/about/img_board_4.png" alt="심나리 이사" loading="lazy" />
                  <figcaption>
                    <h2>심나리 이사</h2>
                    <p>한국맥도날드 상무</p>
                  </figcaption>
                </figure>
              </li>
              <li class="board-member" data-motion="fade-up" data-motion-delay="0.00">
                <figure>
                  <img class="board-member__photo" src="/src/images/about/img_board_5.png" alt="김원규 이사" loading="lazy" />
                  <figcaption>
                    <h2>김원규 이사</h2>
                    <p>웨버샌드윅 대표</p>
                  </figcaption>
                </figure>
              </li>
              <li class="board-member" data-motion="fade-up" data-motion-delay="0.15">
                <figure>
                  <img class="board-member__photo" src="/src/images/about/img_board_6.png" alt="유재홍 이사" loading="lazy" />
                  <figcaption>
                    <h2>유재홍 이사</h2>
                    <p>가능바이오 회장</p>
                  </figcaption>
                </figure>
              </li>
              <li class="board-member" data-motion="fade-up" data-motion-delay="0.30">
                <figure>
                  <img class="board-member__photo" src="/src/images/about/img_board_7.png" alt="강민아 이사" loading="lazy" />
                  <figcaption>
                    <h2>강민아 이사</h2>
                    <p>이화여자대학교 교수</p>
                  </figcaption>
                </figure>
              </li>
              <li class="board-member" data-motion="fade-up" data-motion-delay="0.45">
                <figure>
                  <img class="board-member__photo" src="/src/images/about/img_board_8.png" alt="안진경 이사" loading="lazy" />
                  <figcaption>
                    <h2>안진경 이사</h2>
                    <p>Vastly Korea 대표</p>
                  </figcaption>
                </figure>
              </li>
              <li class="board-member" data-motion="fade-up" data-motion-delay="0.00">
                <figure>
                  <img class="board-member__photo" src="/src/images/about/img_board_9.png" alt="홍사균 감사" loading="lazy" />
                  <figcaption>
                    <h2>홍사균 감사</h2>
                    <p>이정회계법인 이사</p>
                  </figcaption>
                </figure>
              </li>
              <li class="board-member" data-motion="fade-up" data-motion-delay="0.15">
                <figure>
                  <img class="board-member__photo" src="/src/images/about/img_board_10.png" alt="정재민 이사" loading="lazy" />
                  <figcaption>
                    <h2>정재민 이사</h2>
                    <p>부산대학교 어린이병원장<br />부산대학교 소아비뇨생식기<br />클리닉 교수</p>
                  </figcaption>
                </figure>
              </li>
            </ul>
          </div>
        </section>
      </main>
    </div>

    <!-- 푸터 공통 영역 인클루드 -->
    <load ="/includes/footer.html" />
</body>
</html>
