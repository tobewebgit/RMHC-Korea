<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="재단법인 한국로날드맥도날드하우스(RMHC Korea) 회원가입 완료 페이지입니다. 가입을 축하하며, 로그인하여 다양한 활동에 동참하세요."
    />
    <title>가입완료 - 한국로날드맥도날드하우스</title>
    <link rel="stylesheet" href="/src/css/common.css" />
    <link rel="stylesheet" href="/src/css/login.css" />
  </head>
  <body>
    <!-- 웹 접근성 스킵 네비게이션 -->
    <a href="#main-content" class="skip-nav">본문 바로가기</a>

    <!-- 헤더 공통 영역 인클루드 -->
    <load ="/includes/header.html" />

    <div class="page-wrapper">
      <main id="main-content" class="login-section flex-column">
        <div class="login-card join-card">
          <div class="icon-top">
            <img src="/src/images/login/icon-top-hands.svg" alt="" />
          </div>
          <h1 class="login-title">
            반갑습니다! 로날드님 ,<br />나눔의 여정에 함께해주셔서 고맙습니다.
          </h1>
          <p class="login-desc">
            본인인증을 위해 입력하신 개인정보는 본인인증 기관에서 수집하는
            정보이며, 회원가입여부 확인 및 입력편의 제공, 본인인증 목적으로만
            이용됩니다.
          </p>

          <div class="button-wrap">
            <button type="submit" class="btn w-auto btn-primary">
              로그인 하기
            </button>
          </div>
        </div>

        <!-- 배너 -->
        <div class="join-banner-section">
          <h2>
            아이들의 곁을 지키는 특별한 기적, <br class="type-pc" />함께해
            주시겠어요?
          </h2>

          <div class="button-wrap">
            <button type="submit" class="btn w-auto btn-secondary btn-arrow">
              <span>하우스 둘러보기</span>
            </button>
          </div>
        </div>
      </main>

      <!-- 푸터 공통 영역 인클루드 -->
      <load ="/includes/footer.html" />
    </div>
  </body>
</html>
