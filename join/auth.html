<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="재단법인 한국로날드맥도날드하우스(RMHC Korea) 회원가입 본인인증 단계입니다. PASS 및 카카오인증을 통해 안전하게 본인확인을 진행하세요.">
  <title>본인인증 - 한국로날드맥도날드하우스</title>
  <link rel="stylesheet" href="/src/css/style.css">
  <link rel="stylesheet" href="/src/css/join.css">
</head>
<body>

  <!-- 웹 접근성 스킵 네비게이션 -->
  <a href="#main-content" class="skip-nav">본문 바로가기</a>

  <!-- 헤더 공통 영역 인클루드 -->
  <load ="src/includes/header.html" />

  <div class="page-wrapper">
    <main id="main-content" class="join-container">
      
      <!-- 상단 타이틀 구역 -->
      <section class="join-title-area">
        <h1 class="join-title">회원가입</h1>
        <p class="join-desc">간편하고 안전한 회원가입을 위해 본인인증을 진행해 주세요.</p>
      </section>

      <!-- 상단 Step Indicator -->
      <nav class="step-indicator" aria-label="회원가입 진행 단계">
        <div class="step-indicator__item active" aria-current="step">
          <span class="step-indicator__badge">01</span>
          <span class="step-indicator__label">본인인증</span>
        </div>
        <div class="step-indicator__item">
          <span class="step-indicator__badge">02</span>
          <span class="step-indicator__label">정보입력</span>
        </div>
        <div class="step-indicator__item">
          <span class="step-indicator__badge">03</span>
          <span class="step-indicator__label">가입완료</span>
        </div>
      </nav>

      <!-- 본인인증 수단 선택 카드 -->
      <section class="auth-method-section">
        <h2 class="hide-mobile" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">본인인증 수단 선택</h2>
        <div class="auth-method-group">
          <!-- PASS 인증 -->
          <div class="card card-hover auth-method-card auth-method-card--pass" onclick="alert('PASS 인증 팝업이 호출됩니다.')" tabindex="0" role="button" aria-label="PASS 휴대폰 본인인증 시작">
            <div class="auth-method-card__icon-wrap">
              <!-- 휴대폰 인증 아이콘 SVG -->
              <svg class="btn-sns-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                <line x1="12" y1="18" x2="12.01" y2="18"></line>
              </svg>
            </div>
            <h3 class="auth-method-card__title">휴대폰 본인인증</h3>
            <p class="auth-method-card__desc">본인 명의의 휴대폰을 이용하여<br>인증을 진행합니다. (PASS)</p>
            <button type="button" class="btn btn-outline" style="width: 100%;" tabindex="-1">인증하기</button>
          </div>

          <!-- 카카오 인증 -->
          <div class="card card-hover auth-method-card auth-method-card--kakao" onclick="alert('카카오 간편인증 팝업이 호출됩니다.')" tabindex="0" role="button" aria-label="카카오 간편인증 시작">
            <div class="auth-method-card__icon-wrap">
              <!-- 카카오 아이콘 SVG -->
              <svg class="btn-sns-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 3C6.477 3 2 6.477 2 10.75c0 2.72 1.838 5.112 4.6 6.42-.18.66-.65 2.38-.74 2.74-.1.39.15.38.31.28.13-.08 2.02-1.37 2.83-1.92.33.09.68.14 1 .14 5.523 0 10-3.477 10-7.75S17.523 3 12 3z"/>
              </svg>
            </div>
            <h3 class="auth-method-card__title">카카오 간편인증</h3>
            <p class="auth-method-card__desc">카카오톡 앱을 통해 간편하게<br>본인 확인을 완료합니다.</p>
            <button type="button" class="btn btn-secondary" style="width: 100%;" tabindex="-1">인증하기</button>
          </div>
        </div>
      </section>

      <!-- 본인인증 필수 고지 문구 -->
      <div class="auth-notice-box">
        <h4 class="auth-notice-box__title">
          <svg class="auth-notice-box__title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          본인인증 고지사항
        </h4>
        <p class="auth-notice-box__text">
          본인인증을 위해 입력하신 개인정보는 본인인증 기관에서 수집하는 정보이며, 회원가입여부 확인 및 입력편의 제공, 본인인증 목적으로만 이용됩니다.
        </p>
      </div>

      <!-- 임시 진행 버튼 (퍼블리싱 확인용) -->
      <div class="auth-action-group">
        <a href="/join.html" class="btn btn-outline">이전으로</a>
        <a href="/join/form.html" class="btn btn-primary">임시 인증 완료 (다음 단계) &rarr;</a>
      </div>

    </main>

    <!-- 푸터 공통 영역 인클루드 -->
    <load ="src/includes/footer.html" />
  </div>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
