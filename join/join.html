<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <title>회원가입 - RMHC Korea</title>
    <link rel="stylesheet" href="/src/css/common.css" />
    <link rel="stylesheet" href="/src/css/login.css" />
  </head>
  <body>
    <!-- 웹 접근성 스킵 네비게이션 -->
    <a href="#main-content" class="skip-nav">본문 바로가기</a>

    <!-- 헤더 공통 영역 인클루드 -->
    <load ="/includes/header.html" />

    <div class="page-wrapper">
      <main id="main-content" class="login-section">
        <div class="login-card">
          <h1 class="login-title">회원가입</h1>
          <p class="login-desc">회원가입 방법을 선택해주세요.</p>

          <!-- 소셜 로그인 -->
          <div class="social-login">
            <button type="button" class="btn-social btn-social-kakao">
              <span class="icon icon-kakao"></span>
              카카오로 시작하기
            </button>
            <button type="button" class="btn-social btn-social-naver">
              <span class="icon icon-naver"></span>
              네이버로 시작하기
            </button>
          </div>

          <div class="line-box">
            <span class="line-text">또는</span>
          </div>

          <div class="form-group">
            <button
              type="button"
              class="btn btn-outline"
              aria-label="일반 회원가입"
            >
              <span><img src="/src/images/common/icon_join_user.png" alt="" /></span>
              <span>일반 회원가입</span>
            </button>

          <div class="form-group">
            <button
              type="button"
              class="btn btn-outline"
              aria-label="기업/단체 회원"
            >
              <span><img src="/src/images/common/icon_join_biz.png" alt="" /></span>
              <span>기업/단체 회원</span>
            </button>
          </div>

          <div class="login-guide">
            <span>이미 회원이신가요?</span>
            <a href="/login/login.html">로그인</a>
          </div>

          <div class="line"></div>

          <div class="login-links">
            <a href="/login/find-id.html">아이디 찾기</a>
            <a href="/login/reset-pw.html">비밀번호 재설정</a>
          </div>
          <p class="login-info">
            * 만 14세 미만은 보호자 명의로 후원해 주세요.
          </p>
        </div>
      </main>

      <!-- 푸터 공통 영역 인클루드 -->
      <load ="/includes/footer.html" />
    </div>

    <!-- SNS 계정 연동 유도 팝업 (개발팀 연동용 마크업)
       활성화 조건: .modal-overlay에 .active 클래스 추가 -->
    <div class="modal-overlay" id="sns-link-modal">
      <div class="modal-container">
        <div class="modal-header">
          <h2 class="modal-title">SNS 계정 연동 안내</h2>
          <button
            type="button"
            class="modal-close"
            aria-label="닫기"
            onclick="
              document
                .getElementById('sns-link-modal')
                .classList.remove('active')
            "
          >
            &times;
          </button>
        </div>
        <div class="modal-body">
          <p>
            이미 가입된 계정이 있습니다.<br />SNS 계정을 기존 아이디와
            연동하시겠습니까?
          </p>
          <p class="mt-3 text-muted-color text-xs">
            연동 시 이후부터 SNS 로그인으로 간편하게 로그인할 수 있습니다.
          </p>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-outline"
            onclick="
              document
                .getElementById('sns-link-modal')
                .classList.remove('active')
            "
          >
            취소
          </button>
          <a href="/login/link-sns.html" class="btn btn-primary font-bold"
            >계정 연동하기</a
          >
        </div>
      </div>
    </div>

    <script type="module" src="/src/js/common.js"></script>
  </body>
</html>
